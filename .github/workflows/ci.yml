name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fleet:
    name: Fleet Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Fleet workflow
        id: fleet_run
        continue-on-error: true
        run: npm run fleet:run

      - name: Publish Fleet PR summary
        if: always()
        run: |
          if [ -f .fleet/reports/pr-summary.md ]; then
            cat .fleet/reports/pr-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "# Fleet PR Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No Fleet summary was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Print Fleet failure diagnosis
        if: always() && steps.fleet_run.outcome != 'success'
        run: |
          echo "Fleet workflow failed. Phase diagnosis:" >&2
          if [ -f .fleet/reports/pr-summary.md ]; then
            cat .fleet/reports/pr-summary.md >&2
          else
            echo "No Fleet summary was generated." >&2
          fi

      - name: Upload Fleet reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fleet-reports
          path: .fleet/reports
          if-no-files-found: ignore
          overwrite: true

      - name: Fail workflow on Fleet errors
        if: steps.fleet_run.outcome != 'success'
        run: exit 1
