name: ✨ Feature Request
description: 提交新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提交你的想法！请尽量详细描述，帮助我们更好地理解你的需求。

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 描述你遇到的问题或希望改进的场景。
      placeholder: 当我想做某件事时，我发现……
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你希望如何实现这个功能。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案（可选）
      description: 描述你考虑过的其他方案及其优缺点。

  - type: dropdown
    id: area
    attributes:
      label: 功能领域
      description: 该需求主要涉及哪个模块？
      options:
        - 剧情 / Story System
        - 大臣 / Minister System
        - 国势数值 / Nation Stats
        - 战斗 / Combat
        - UI / 交互
        - AI 集成
        - 存档系统
        - 其他
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息（可选）
      description: 参考资料、截图、草图等任何有助于理解需求的内容。
